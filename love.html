<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="love.css" />
    <title>For You ❤️</title>
</head>

<body>
    <div class="container"> <!-- Envelope -->
        <div class="envelope" id="envelope">
            <div class="flap"></div>
            <div class="body"></div>
        </div> <!-- Letter -->
        <div class="letter" id="letter">
            <p id="letterText">Hey ❤️</p>
        </div> <!-- Buttons BELOW envelope -->
        <div class="buttons"> <button id="openBtn">Open 💌</button> <button id="prevBtn"
                class="hidden">Previous</button> <button id="nextBtn" class="hidden">Next</button> </div>
    </div>
    <script src="love.js" defer></script>
</body>

</html>
