<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mustali Dhanerawala</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=BJ+Cree:wght@400;500;600;700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Floating Hearts -->
  <div id="hearts-container"></div>

  <!-- Login Box -->
  <div class="login-box" id="loginBox">
    <h2>Enter the password 💖</h2>
    
    <input 
      type="text" 
      id="nameInput" 
      placeholder="Type here..." 
      autocomplete="off"
    />
    
    <button id="unlockBtn">Unlock ❤️</button>
    
    <p class="hint">Hint: Its your name !</p>
  </div>

  <!-- Success Screen -->
  <div id="success">
    <h1>Hey ❤️</h1>
    <h2>I was waiting for you...</h2>
    <p>Now something special awaits 💌</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
